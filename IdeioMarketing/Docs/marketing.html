<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>İdeio · Satış & Pazarlama Paneli</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --orange:#FF7A3C; --orange-2:#ED6B2D; --orange-soft:rgba(255,122,60,.14);
    --bg:#121214; --bg2:#0C0C0E; --surface:#1C1C20; --surface2:#26262C;
    --sidebar:#0E0E10; --ink:#F4F2EF; --body:#B7B5BD; --muted:#7E7C86; --line:#2C2C33;
    --green:#39C07A; --blue:#4FA0E6; --red:#E0544E; --amber:#E6A93C; --purple:#9A7BD4;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background:radial-gradient(1000px 540px at 100% -8%, rgba(255,122,60,.12), transparent 58%),
               radial-gradient(760px 520px at -12% 112%, rgba(255,122,60,.07), transparent 60%);}
  ::-webkit-scrollbar{height:10px;width:10px;}
  ::-webkit-scrollbar-thumb{background:#ffffff14;border-radius:9px;}
  ::-webkit-scrollbar-thumb:hover{background:#ffffff22;}
  input:focus,select:focus,textarea:focus{border-color:var(--orange)!important;outline:none;}
  button{font-family:inherit;}
  @keyframes pop{from{transform:translateY(8px) scale(.98);opacity:0}to{transform:none;opacity:1}}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;}}

  .app{display:flex;min-height:100vh;position:relative;z-index:1;}
  .sidebar{width:240px;flex-shrink:0;background:linear-gradient(180deg,#101012,#0B0B0D);color:#E8E7E4;display:flex;flex-direction:column;padding:22px 16px;border-right:1px solid var(--line);}
  .logo{display:flex;align-items:baseline;gap:1px;padding:4px 8px 4px;font-family:'Space Grotesk',sans-serif;font-size:25px;letter-spacing:-.5px;}
  .logo b{font-weight:700;background:linear-gradient(90deg,#FF7A3C,#FF9D5C);-webkit-background-clip:text;background-clip:text;color:transparent;} .logo span{font-weight:500;color:#fff;}
  .dept{font-size:10.5px;font-weight:600;letter-spacing:1.5px;color:#6E6C76;padding:6px 8px 14px;text-transform:uppercase;}
  .nav-btn{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:11px;border:none;cursor:pointer;text-align:left;font-size:13.5px;font-weight:600;background:transparent;color:#B5B3BB;transition:.15s;width:100%;margin-bottom:3px;}
  .nav-btn:hover{background:#1B1B1F;color:#fff;}
  .nav-btn.active{background:linear-gradient(90deg,var(--orange-2),var(--orange));color:#fff;box-shadow:0 6px 18px rgba(255,122,60,.25);}
  .nav-btn svg{width:18px;height:18px;flex-shrink:0;}
  .side-foot{margin-top:auto;padding:14px 12px;border-top:1px solid #ffffff12;}
  .side-foot small{font-size:11px;color:#6E6C76;display:block;margin-bottom:4px;}
  .side-foot b{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:600;color:var(--orange);}

  .main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 28px;border-bottom:1px solid var(--line);background:rgba(18,18,20,.7);backdrop-filter:blur(6px);}
  .topbar h1{margin:0;font-family:'Space Grotesk',sans-serif;font-size:21px;font-weight:600;}
  .topbar p{margin:2px 0 0;font-size:13px;color:var(--muted);}
  .content{flex:1;overflow-y:auto;padding:28px;}

  .btn-primary{background:linear-gradient(90deg,var(--orange-2),var(--orange));color:#fff;border:none;border-radius:10px;padding:10px 18px;font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px;box-shadow:0 6px 18px rgba(255,122,60,.25);}
  .btn-ghost{background:transparent;color:var(--body);border:1px solid var(--line);border-radius:10px;padding:10px 16px;font-size:14px;font-weight:600;cursor:pointer;}
  .icon-btn{background:transparent;border:none;cursor:pointer;color:var(--muted);padding:6px;border-radius:8px;display:inline-grid;place-items:center;}
  .icon-btn:hover{background:#ffffff10;color:var(--ink);}

  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(205px,1fr));gap:16px;}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:18px 20px;display:flex;flex-direction:column;gap:10px;position:relative;overflow:hidden;}
  .kpi::after{content:"";position:absolute;inset:0 0 auto 0;height:2px;background:linear-gradient(90deg,transparent,var(--orange),transparent);opacity:.35;}
  .kpi-top{display:flex;align-items:center;justify-content:space-between;}
  .kpi-label{font-size:12.5px;font-weight:600;color:var(--muted);}
  .kpi-ic{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;}
  .kpi-ic svg{width:17px;height:17px;}
  .kpi-val{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:600;line-height:1.05;}
  .kpi-sub{font-size:12px;color:var(--body);}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:20px;}
  .card h3{margin:0 0 16px;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;color:var(--ink);}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  .legend{display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:10px;}
  .legend span{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--body);}
  .legend i{width:9px;height:9px;border-radius:3px;display:inline-block;}
  .owner-row{margin-bottom:13px;}
  .owner-head{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;gap:10px;}
  .owner-head b{color:var(--ink);} .owner-head em{color:var(--body);font-style:normal;white-space:nowrap;}
  .bar-bg{height:8px;background:#00000030;border-radius:99px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:99px;transition:width .4s;cursor:default;}
  .stat-list{display:flex;flex-direction:column;gap:14px;justify-content:center;height:100%;}
  .stat{display:flex;flex-direction:column;gap:3px;}
  .stat em{font-style:normal;font-size:12.5px;color:var(--muted);font-weight:600;}
  .stat b{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:600;color:var(--ink);}

  .seg{display:flex;flex-wrap:wrap;gap:6px;}
  .seg button{border:1px solid var(--line);background:var(--surface);color:var(--body);border-radius:9px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;}
  .seg button:hover{border-color:#46464e;color:var(--ink);}
  .seg button.on{background:linear-gradient(90deg,var(--orange-2),var(--orange));color:#fff;border-color:transparent;box-shadow:0 5px 14px rgba(255,122,60,.25);}
  .seg-mode button{padding:9px 20px;font-size:13.5px;}
  .mode-note{font-size:12px;color:var(--muted);margin-top:8px;}

  .filters{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
  .search{position:relative;flex:1;min-width:200px;}
  .search svg{position:absolute;left:13px;top:11px;width:16px;height:16px;color:var(--muted);}
  .search input{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px 10px 38px;font-size:14px;background:var(--surface2);color:var(--ink);}
  select.flt{border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-size:13px;color:var(--ink);background:var(--surface2);cursor:pointer;}
  .table-wrap{background:var(--surface);border:1px solid var(--line);border-radius:16px;overflow:hidden;}
  table{width:100%;border-collapse:collapse;min-width:860px;}
  thead tr{background:#15151820;}
  th{text-align:left;padding:13px 16px;font-size:11.5px;font-weight:600;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;border-bottom:1px solid var(--line);}
  th.r,td.r{text-align:right;}
  td{padding:13px 16px;border-bottom:1px solid var(--line);font-size:13px;color:var(--body);}
  tbody tr:hover{background:#ffffff06;}
  .co{font-weight:600;font-size:14px;color:var(--ink);}
  .co-sub{font-size:12px;color:var(--muted);margin-top:2px;}
  .val{text-align:right;font-weight:600;font-size:13.5px;color:var(--ink);white-space:nowrap;}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:3px 10px;border-radius:999px;white-space:nowrap;}
  .pill i{width:6px;height:6px;border-radius:99px;}
  .tag{display:inline-block;font-size:11.5px;font-weight:600;padding:2px 9px;border-radius:7px;white-space:nowrap;}
  .avatar{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--body);}
  .avatar i{width:24px;height:24px;border-radius:99px;display:grid;place-items:center;font-size:11px;font-weight:700;font-style:normal;}
  .empty{padding:48px;text-align:center;color:var(--muted);font-size:14px;}

  .ptable{width:100%;border-collapse:collapse;min-width:680px;}
  .ptable th,.ptable td{padding:11px 13px;font-size:13px;border-bottom:1px solid var(--line);text-align:right;white-space:nowrap;}
  .ptable th:first-child,.ptable td:first-child{text-align:left;}
  .ptable thead th{font-size:11px;text-transform:uppercase;color:var(--muted);font-weight:600;letter-spacing:.4px;}
  .ptable tfoot td{font-weight:700;color:var(--ink);border-top:2px solid var(--line);border-bottom:none;}
  .pname{display:flex;align-items:center;gap:8px;font-weight:600;color:var(--ink);}
  .pdot{width:10px;height:10px;border-radius:99px;}

  .kanban{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px;}
  .col{width:268px;flex-shrink:0;background:#161619;border-radius:14px;padding:10px;border:1.5px solid var(--line);transition:.15s;align-self:flex-start;}
  .col-head{display:flex;align-items:center;gap:8px;padding:4px 8px 6px;}
  .col-head i{width:8px;height:8px;border-radius:99px;}
  .col-head b{font-weight:600;font-size:13.5px;color:var(--ink);}
  .col-head .cnt{font-size:12px;color:var(--muted);background:#ffffff10;border-radius:99px;padding:1px 8px;}
  .col-total{font-size:11.5px;color:var(--body);font-weight:600;padding:0 8px 10px;}
  .col-list{display:flex;flex-direction:column;gap:9px;min-height:40px;}
  .pcard{background:var(--surface2);border-radius:11px;padding:12px 13px;cursor:grab;border:1px solid var(--line);}
  .pcard:active{cursor:grabbing;}
  .pcard-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .pcard-top b{font-weight:600;font-size:13.5px;color:var(--ink);line-height:1.3;}
  .pcard-top svg{width:14px;height:14px;color:var(--muted);flex-shrink:0;margin-top:2px;}
  .pcard-svc{font-size:12px;color:var(--muted);margin:5px 0 9px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .pcard-foot{display:flex;justify-content:space-between;align-items:center;}
  .pcard-foot b{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13.5px;}
  .chip{width:22px;height:22px;border-radius:99px;display:grid;place-items:center;font-size:10.5px;font-weight:700;font-style:normal;}

  .team-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:4px;}
  .pcust{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px;gap:10px;}
  .pcust:last-child{border-bottom:none;}
  .pcust .nm{color:var(--ink);font-weight:500;}
  .pcust .vv{font-weight:600;white-space:nowrap;color:var(--ink);}
  .half{font-size:10px;font-weight:600;color:var(--muted);background:#ffffff0d;padding:1px 6px;border-radius:6px;margin-left:6px;}
  .phead{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .phead .dot{width:11px;height:11px;border-radius:99px;}
  .phead .nm{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:600;}
  .phead .big{margin-left:auto;font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:600;}

  .pframe{width:100%;height:calc(100vh - 150px);min-height:560px;border:1px solid var(--line);border-radius:14px;background:#0f1422;}

  #tip{position:fixed;z-index:200;display:none;background:#0A0A0C;color:var(--ink);border:1px solid #3A3A42;padding:6px 10px;border-radius:8px;font-size:12px;font-weight:600;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.5);white-space:nowrap;}

  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;}
  .modal{background:var(--surface);border:1px solid var(--line);border-radius:18px;width:100%;max-width:560px;box-shadow:0 24px 70px rgba(0,0,0,.6);animation:pop .18s ease;}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line);}
  .modal-head h3{margin:0;font-family:'Space Grotesk',sans-serif;font-size:18px;}
  .form{padding:22px;display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .field{display:flex;flex-direction:column;gap:6px;}
  .field.full{grid-column:1/-1;}
  .field label{font-size:12px;font-weight:600;color:var(--body);}
  .field input,.field select,.field textarea{border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:14px;color:var(--ink);background:var(--surface2);width:100%;font-family:inherit;}
  .field textarea{min-height:70px;resize:vertical;}
  .hint{font-size:11px;color:var(--muted);}
  .modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:0 22px 22px;}
  .confirm{max-width:380px;padding:24px;text-align:center;}
  .confirm p{font-size:15px;color:var(--ink);margin:0 0 20px;}
  .confirm .row{display:flex;gap:10px;justify-content:center;}

  @media(max-width:760px){.sidebar{display:none;}.grid-2,.team-grid{grid-template-columns:1fr;}.form{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo"><b>ideio</b><span>.</span></div>
    <div class="dept">Satış &amp; Pazarlama</div>
    <nav id="nav"></nav>
    <div class="side-foot"><small>Aktif aylık düzenli gelir</small><b id="side-total">0 ₺</b></div>
  </aside>
  <main class="main">
    <header class="topbar">
      <div><h1 id="page-title">Satış Paneli</h1><p id="page-sub"></p></div>
      <button class="btn-primary" id="add-btn">＋ Yeni fırsat</button>
    </header>
    <div class="content" id="content"></div>
  </main>
</div>
<div id="tip"></div>
<div id="modal-root"></div>

const fmtTRY=n=>(Number(n)||0).toLocaleString("tr-TR")+" ₺";

const fmtK=n=>{const v=Number(n)||0;if(v>=1e6)return(v/1e6).toFixed(2).replace(/\.?0+$/,"")+"M";if(v>=1e3)return Math.round(v/1e3)+"K";return""+Math.round(v);};

const ownersOf=l=>Array.isArray(l.owners)?l.owners:(l.owner?[l.owner]:[]);
const credit=(leads,person)=>leads.reduce((a,l)=>{const o=ownersOf(l);return a+(o.includes(person)?(Number(l.value)||0)/o.length:0);},0);
const countCredit=(leads,person)=>leads.reduce((a,l)=>{const o=ownersOf(l);return a+(o.includes(person)?1/o.length:0);},0);

const Store={
  async load(){
    try{if(window.storage){const r=await window.storage.get(KEY);if(r&&r.value)return JSON.parse(r.value);}}catch(e){}
    try{const v=localStorage.getItem(KEY);if(v)return JSON.parse(v);}catch(e){}
    return null;
  },
  async save(d){
    try{if(window.storage){await window.storage.set(KEY,JSON.stringify(d));return;}}catch(e){}
    try{localStorage.setItem(KEY,JSON.stringify(d));}catch(e){}
  }
};

/* satış modu bağlamı (Düzenli / Dış / Toplam) — yalnızca 2026 satışları */
function modeCtx(m){
  let label,suf,genel,aylik;
  if(S.salesMode==="duzenli"){label="Düzenli iş";suf=" /ay";genel=m.duz;aylik=m.duz2026;}
  else if(S.salesMode==="dis"){label="Dış iş";suf="";genel=m.dis;aylik=m.dis;}
  else {label="Toplam satış";suf="";genel=m.duz.concat(m.dis);aylik=m.duz2026.concat(m.dis);}
  return{label,suf,genel,aylik};
}

function barChart(data){
  const W=540,H=250,P={t:18,r:10,b:30,l:54},cw=W-P.l-P.r,ch=H-P.t-P.b,max=Math.max(...data.map(d=>d.value),1),ticks=4;
  let g="";for(let i=0;i<=ticks;i++){const y=P.t+ch-(ch*i/ticks);g+=`<line x1="${P.l}" y1="${y}" x2="${W-P.r}" y2="${y}" stroke="${AX.grid}"/><text x="${P.l-8}" y="${y+4}" text-anchor="end" font-size="11" fill="${AX.tick}">${fmtK(max*i/ticks)}</text>`;}
  const n=data.length,slot=cw/n,bw=Math.min(58,slot*0.56);let bars="";
  data.forEach((d,i)=>{const h=ch*d.value/max,x=P.l+slot*i+(slot-bw)/2,y=P.t+ch-h,tip=esc(d.tip||`${d.label}: ${fmtTRY(d.value)}`);bars+=`<rect x="${x}" y="${y}" width="${bw}" height="${Math.max(h,1)}" rx="6" fill="${d.color}" data-tip="${tip}" style="cursor:default"/>${d.value?`<text x="${x+bw/2}" y="${y-7}" text-anchor="middle" font-size="11" font-weight="600" fill="${d.color}">${fmtK(d.value)}</text>`:""}<text x="${x+bw/2}" y="${H-10}" text-anchor="middle" font-size="12.5" fill="${AX.lab}">${esc(d.label)}</text>`;});
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">${g}${bars}</svg>`;
}
function lineChartMulti(series,labels,suf){
  const W=560,H=250,P={t:18,r:16,b:30,l:56},cw=W-P.l-P.r,ch=H-P.t-P.b,max=Math.max(1,...series.flatMap(s=>s.values)),ticks=4;
  let g="";for(let i=0;i<=ticks;i++){const y=P.t+ch-(ch*i/ticks);g+=`<line x1="${P.l}" y1="${y}" x2="${W-P.r}" y2="${y}" stroke="${AX.grid}"/><text x="${P.l-8}" y="${y+4}" text-anchor="end" font-size="11" fill="${AX.tick}">${fmtK(max*i/ticks)}</text>`;}
  const n=labels.length,step=n>1?cw/(n-1):0;let paths="",hits="";
  series.forEach(s=>{const pts=s.values.map((v,i)=>[P.l+step*i,P.t+ch-ch*v/max]);
    const d=pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
    paths+=`<path d="${d}" fill="none" stroke="${s.color}" stroke-width="2.5" stroke-linejoin="round"/>`;
    pts.forEach((p,i)=>{paths+=`<circle cx="${p[0]}" cy="${p[1]}" r="3.4" fill="${s.color}"/>`;hits+=`<circle cx="${p[0]}" cy="${p[1]}" r="10" fill="#fff" fill-opacity="0" data-tip="${esc(s.name+" · "+labels[i]+": "+fmtTRY(s.values[i])+(suf||""))}" style="cursor:default"/>`;});});
  let xl="";labels.forEach((lab,i)=>xl+=`<text x="${P.l+step*i}" y="${H-10}" text-anchor="middle" font-size="12.5" fill="${AX.lab}">${lab}</text>`);
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">${g}${paths}${xl}${hits}</svg>`;
}
function donut(data,centerLabel){
  const cx=92,cy=92,r=64,sw=26,circ=2*Math.PI*r,total=data.reduce((a,d)=>a+d.value,0);let acc=0,seg="";
  (data.length?data:[{value:1,color:"#2C2C33",name:"—"}]).forEach(d=>{const t=Math.max(total,1),len=circ*d.value/t;seg+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${d.color}" stroke-width="${sw}" stroke-dasharray="${len} ${circ-len}" stroke-dashoffset="${-acc}" transform="rotate(-90 ${cx} ${cy})" data-tip="${esc((d.name||"")+": "+(Math.round(d.value*10)/10))}" style="cursor:default"/>`;acc+=len;});
  return `<svg viewBox="0 0 184 184" width="184" height="184" style="display:block;margin:0 auto">${seg}<text x="92" y="86" text-anchor="middle" font-size="12" fill="${AX.tick}">${centerLabel||"Toplam"}</text><text x="92" y="108" text-anchor="middle" font-size="22" font-weight="600" fill="${AX.num}" font-family="Space Grotesk">${Math.round(total)}</text></svg>`;
}
function legendOf(data){return data.map(d=>`<span><i style="background:${d.color}"></i>${esc(d.name)} · ${Math.round(d.value*10)/10}</span>`).join("");}
function hbars(items){const max=Math.max(...items.map(i=>i.value),1);return items.map(i=>`<div class="owner-row"><div class="owner-head"><b>${esc(i.label)}</b><em>${fmtTRY(i.value)}${i.suffix||""}</em></div><div class="bar-bg"><div class="bar-fill" data-tip="${esc(i.tip||(i.label+": "+fmtTRY(i.value)))}" style="width:${i.value/max*100}%;background:${i.color||'var(--orange)'}"></div></div></div>`).join("");}

function pill(stage){const s=stageOf(stage);return `<span class="pill" style="color:${s.color};background:${s.color}26"><i style="background:${s.color}"></i>${s.label}</span>`;}
function tempTag(t){const x=TEMPS[t]||TEMPS.soguk;return `<span class="tag" style="color:${x.color};background:${x.soft}">${x.label}</span>`;}
function statusTag(st){const on=st==="Düzenli İş";return `<span class="tag" style="color:${on?"#39C07A":"#9A7BD4"};background:${on?"rgba(57,192,122,.16)":"rgba(154,123,212,.18)"}">${st}</span>`;}

const monthCell=l=>is2026(l)?`<span class="tag" style="background:#ffffff0d;color:var(--body)">${monthLabel(monthKey(l))}</span>`:'<span style="color:var(--muted)">—</span>';

function leadRows(list){

function filteredLeads(){
  const tq=S.q.trim().toLocaleLowerCase("tr");
  return S.leads.filter(l=>{
    if(S.fStatus!=="all"&&l.status!==S.fStatus)return false;
    if(S.fMonth!=="all"&&monthKey(l)!==S.fMonth)return false;
    if(S.fStage!=="all"&&l.stage!==S.fStage)return false;
    if(S.fOwner!=="all"&&!ownersOf(l).includes(S.fOwner))return false;
    if(!tq)return true;
    return (l.company+" "+l.contact+" "+l.status+" "+ownersOf(l).join(" ")).toLocaleLowerCase("tr").includes(tq);
  });
}

    return `<div class="col" data-col="${s.id}"><div class="col-head"><i style="background:${s.color}"></i><b>${s.label}</b><span class="cnt">${items.length}</span></div><div class="col-total">${fmtTRY(sum(items))}</div><div class="col-list">${cards}</div></div>`;
  }).join("");
  return `<div class="kanban" id="kanban">${cols}</div>`;
}
function viewPricing(){return `<iframe class="pframe" id="pf" sandbox="allow-scripts allow-popups allow-forms allow-modals"></iframe>`;}

/* ---------------- modal / form ---------------- */
function openForm(lead){
  const ow=lead?ownersOf(lead):[OWNERS[0]];
  const f=lead||{company:"",contact:"",email:"",source:SOURCES[0],status:STATUS[0],temp:"sicak",value:"",stage:"new",date:new Date().toISOString().slice(0,10),note:""};
  const o1=ow[0]||OWNERS[0], o2=ow[1]||"";
  const sel=(arr,v)=>arr.map(o=>`<option ${o===v?"selected":""}>${o}</option>`).join("");
  const stSel=STAGES.map(s=>`<option value="${s.id}" ${f.stage===s.id?"selected":""}>${s.label}</option>`).join("");
  const tempSel=`<option value="sicak" ${f.temp==="sicak"?"selected":""}>Sıcak</option><option value="soguk" ${f.temp==="soguk"?"selected":""}>Soğuk</option>`;
  const o2opts=`<option value="">— yok —</option>`+OWNERS.map(o=>`<option ${o===o2?"selected":""}>${o}</option>`).join("");
  document.getElementById("modal-root").innerHTML=`<div class="overlay" id="ov"><div class="modal" id="md">
    <div class="modal-head"><h3>${lead?"Fırsatı düzenle":"Yeni fırsat"}</h3><button class="icon-btn" id="mclose">${ICON.x}</button></div>
    <div class="form">
      <div class="field full"><label>Firma / Müşteri adı</label><input id="f-company" value="${esc(f.company)}" placeholder="Örn. Ege Yapı İnşaat"></div>
      <div class="field"><label>İlgili kişi</label><input id="f-contact" value="${esc(f.contact)}" placeholder="Ad Soyad / Departman"></div>
      <div class="field"><label>E-posta</label><input id="f-email" value="${esc(f.email)}" placeholder="info@firma.com"></div>
      <div class="field"><label>Statü</label><select id="f-status">${sel(STATUS,f.status)}</select><span class="hint">Düzenli: aylık tekrarlayan · Dış: tek seferlik</span></div>
      <div class="field"><label>Müşteri sıcaklığı</label><select id="f-temp">${tempSel}</select></div>
      <div class="field"><label>Sorumlu</label><select id="f-owner1">${sel(OWNERS,o1)}</select></div>
      <div class="field"><label>2. sorumlu (opsiyonel)</label><select id="f-owner2">${o2opts}</select><span class="hint">İki kişide kredi yarıya bölünür</span></div>
      <div class="field"><label>Kaynak</label><select id="f-source">${sel(SOURCES,f.source)}</select></div>
      <div class="field"><label id="lbl-value">Tahmini değer (₺)</label><input id="f-value" type="number" value="${f.value}" placeholder="0"></div>
      <div class="field"><label>Aşama</label><select id="f-stage">${stSel}</select></div>
      <div class="field"><label>Tarih (satış ayı)</label><input id="f-date" type="date" value="${f.date}"></div>
      <div class="field full"><label>Not</label><textarea id="f-note" placeholder="Görüşme notu, teklif detayı…">${esc(f.note)}</textarea></div>
    </div>
    <div class="modal-foot"><button class="btn-ghost" id="mcancel">Vazgeç</button><button class="btn-primary" id="msave">${lead?"Değişiklikleri kaydet":"Fırsatı ekle"}</button></div>
  </div></div>`;
  const close=()=>document.getElementById("modal-root").innerHTML="";
  const syncLabel=()=>{document.getElementById("lbl-value").textContent=document.getElementById("f-status").value==="Düzenli İş"?"Aylık değer (₺/ay)":"Toplam değer (₺)";};
  syncLabel();document.getElementById("f-status").onchange=syncLabel;
  document.getElementById("ov").onclick=e=>{if(e.target.id==="ov")close();};
  document.getElementById("mclose").onclick=close;document.getElementById("mcancel").onclick=close;
  document.getElementById("f-company").focus();
  document.getElementById("msave").onclick=()=>{
    const g=id=>document.getElementById(id).value;
    const company=g("f-company").trim();
    if(!company){document.getElementById("f-company").style.borderColor="#E0544E";return;}
    const owners=[g("f-owner1")]; const o2v=g("f-owner2"); if(o2v&&o2v!==owners[0])owners.push(o2v);
    const obj={id:f.id||uid(),company,contact:g("f-contact"),email:g("f-email"),source:g("f-source"),status:g("f-status"),temp:g("f-temp"),value:Number(g("f-value"))||0,owners,stage:g("f-stage"),date:g("f-date"),note:g("f-note")};
    const i=S.leads.findIndex(l=>l.id===obj.id);
    if(i>=0)S.leads[i]=obj;else S.leads.unshift(obj);
    close();commit();
  };
}
function confirmDelete(lead){
  document.getElementById("modal-root").innerHTML=`<div class="overlay" id="cov"><div class="modal confirm"><p><b>${esc(lead.company)}</b> silinsin mi?<br><span style="font-size:13px;color:var(--muted)">Bu işlem geri alınamaz.</span></p><div class="row"><button class="btn-ghost" id="cno">Vazgeç</button><button class="btn-primary" id="cyes" style="background:#E0544E;box-shadow:none">Sil</button></div></div></div>`;
  const close=()=>document.getElementById("modal-root").innerHTML="";
  document.getElementById("cov").onclick=e=>{if(e.target.id==="cov")close();};
  document.getElementById("cno").onclick=close;
  document.getElementById("cyes").onclick=()=>{S.leads=S.leads.filter(l=>l.id!==lead.id);close();commit();};
}

/* ---------------- render ---------------- */
const NAV=[
  {id:"dashboard",label:"Panel",icon:"dashboard"},
  {id:"leads",label:"Tüm Müşteriler",icon:"users"},
  {id:"sicak",label:"Sıcak Müşteriler",icon:"flame"},
  {id:"soguk",label:"Soğuk Müşteriler",icon:"snow"},
  {id:"pipeline",label:"Pipeline",icon:"columns"},
  {id:"team",label:"Ekip Performansı",icon:"perf"},
  {id:"churn",label:"Kayıp Analizi",icon:"churn"},
  {id:"pricing",label:"Fiyatlandırma Motoru",icon:"calc"},
];
const TITLES={
  dashboard:["Satış Paneli","Düzenli / dış iş / toplam — 2026 satış görünümü"],
  leads:["Tüm Müşteriler",""],
  sicak:["Sıcak Müşteriler","İlgili, dönüşmeye yakın müşteri adayları"],
  soguk:["Soğuk Müşteriler","Henüz ısıtılmamış / yeni temas adayları"],
  pipeline:["Pipeline","Aşamalar arası sürükle-bırak"],
  team:["Ekip Performansı","Son 6 ay · kişiye göre satış (ortak işte kredi yarıya bölünür)"],
  churn:["Kayıp Analizi","Son 6 ayda kaybedilen düzenli müşteriler"],
  pricing:["Fiyatlandırma Motoru","Maliyet, paket ve teklif hesaplama"],
};

function render(){
  const m=metrics();
  document.getElementById("nav").innerHTML=NAV.map(n=>`<button class="nav-btn ${S.view===n.id?"active":""}" data-view="${n.id}">${ICON[n.icon]}${n.label}</button>`).join("");
  document.getElementById("side-total").textContent=fmtTRY(m.mrr)+" /ay";
  const [t,sub]=TITLES[S.view];
  document.getElementById("page-title").textContent=t;
  document.getElementById("page-sub").textContent=S.view==="leads"?filteredLeads().length+" kayıt":sub;

  const c=document.getElementById("content");
  if(S.view==="dashboard")c.innerHTML=viewDashboard();
  else if(S.view==="leads")c.innerHTML=viewLeads();
  else if(S.view==="sicak")c.innerHTML=viewTemp("sicak");
  else if(S.view==="soguk")c.innerHTML=viewTemp("soguk");
  else if(S.view==="pipeline")c.innerHTML=viewPipeline();
  else if(S.view==="team")c.innerHTML=viewTeam();
  else if(S.view==="churn")c.innerHTML=viewChurn();
  else if(S.view==="pricing")c.innerHTML=viewPricing();

  document.querySelectorAll("[data-view]").forEach(b=>b.onclick=()=>{S.view=b.dataset.view;render();});
  document.querySelectorAll("[data-sm]").forEach(b=>b.onclick=()=>{S.salesMode=b.dataset.sm;render();});
  document.querySelectorAll("[data-pm]").forEach(b=>b.onclick=()=>{S.perfMonth=b.dataset.pm;render();});

  if(S.view==="leads"){
    document.getElementById("q").oninput=e=>{S.q=e.target.value;const list=filteredLeads();document.getElementById("page-sub").textContent=list.length+" kayıt";document.querySelector("tbody").innerHTML=leadRows(list)||`<tr><td colspan="8" class="empty">Eşleşen kayıt yok.</td></tr>`;bindRowActions();};
    document.getElementById("fStatus").onchange=e=>{S.fStatus=e.target.value;render();};
    document.getElementById("fMonth").onchange=e=>{S.fMonth=e.target.value;render();};
    document.getElementById("fStage").onchange=e=>{S.fStage=e.target.value;render();};
    document.getElementById("fOwner").onchange=e=>{S.fOwner=e.target.value;render();};
  }
  if(["leads","sicak","soguk","churn"].includes(S.view))bindRowActions();
  if(S.view==="pipeline")bindKanban();
  if(S.view==="pricing"){const fr=document.getElementById("pf");try{fr.srcdoc=new TextDecoder().decode(Uint8Array.from(atob(PRICING_B64),ch=>ch.charCodeAt(0)));}catch(e){fr.srcdoc="<p style='font-family:sans-serif;padding:24px'>Fiyatlandırma motoru yüklenemedi.</p>";}}
}
function bindRowActions(){
  document.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>openForm(S.leads.find(l=>l.id===b.dataset.edit)));
  document.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>confirmDelete(S.leads.find(l=>l.id===b.dataset.del)));
}
function bindKanban(){
  document.querySelectorAll(".pcard").forEach(card=>{
    card.addEventListener("dragstart",()=>{dragId=card.dataset.card;});
    card.addEventListener("dragend",()=>{dragId=null;document.querySelectorAll(".col").forEach(c=>c.style.removeProperty("background"));document.querySelectorAll(".col").forEach(c=>c.style.borderColor="var(--line)");});
    card.addEventListener("click",e=>{if(!e.defaultPrevented)openForm(S.leads.find(l=>l.id===card.dataset.card));});
  });
  document.querySelectorAll(".col").forEach(col=>{const stage=stageOf(col.dataset.col);
    col.addEventListener("dragover",e=>{e.preventDefault();col.style.background=stage.color+"14";col.style.borderColor=stage.color;});
    col.addEventListener("dragleave",()=>{col.style.removeProperty("background");col.style.borderColor="var(--line)";});
    col.addEventListener("drop",()=>{col.style.removeProperty("background");col.style.borderColor="var(--line)";if(dragId){const l=S.leads.find(x=>x.id===dragId);if(l&&l.stage!==col.dataset.col){l.stage=col.dataset.col;commit();}}dragId=null;});
  });
}

/* tooltip (grafik nokta/renk üstüne mouse) */
(function(){
  const tip=document.getElementById("tip"),content=document.getElementById("content");
  content.addEventListener("mousemove",e=>{
    const el=e.target.closest("[data-tip]");
    if(el){tip.textContent=el.getAttribute("data-tip");tip.style.display="block";
      let x=e.clientX+14,y=e.clientY-12;if(x>window.innerWidth-180)x=e.clientX-tip.offsetWidth-14;
      tip.style.left=x+"px";tip.style.top=y+"px";}
    else tip.style.display="none";
  });
  content.addEventListener("mouseleave",()=>tip.style.display="none");
})();

document.getElementById("add-btn").onclick=()=>openForm(null);
(async()=>{const saved=await Store.load();if(saved&&Array.isArray(saved)&&saved.length)S.leads=saved;render();})();
</script>
</body>
</html>
